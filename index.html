<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Contact Manager Freelancer</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      background: #f5f6fa;
    }

    .sidebar {
      height: 100vh;
    }

    .card-client {
      cursor: pointer;
    }

    .disabled-btn {
      pointer-events: none;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Freelance Contact Manager</span>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalForm">
      + Tambah Kontak
    </button>
    <button class="btn btn-warning ms-2" onclick="clearAll()">Reset</button>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <!-- SIDEBAR -->
      <div class="col-3 bg-white sidebar p-3">
        <h5>Daftar Client</h5>
        <div id="clientList"></div>
      </div>

      <!-- DETAIL -->
      <div class="col-9 p-4">
        <h4>Detail</h4>
        <div id="detailBox">Pilih client dulu… jangan malas.</div>
      </div>

    </div>
  </div>

  <!-- MODAL FORM -->
  <div class="modal fade" id="modalForm">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>Tambah Kontak</h5>
        </div>
        <div class="modal-body">
          <input id="nama" class="form-control mb-2" placeholder="Nama Usaha">
          <input id="wa" class="form-control mb-2" placeholder="No WhatsApp">
          <input id="email" class="form-control mb-2" placeholder="Email">
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" onclick="addContact()">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    let contacts = [];
    let selected = null;

    // LOAD dari localStorage saat pertama kali buka
    function loadFromStorage() {
      let data = localStorage.getItem("contacts");

      if (data) {
        contacts = JSON.parse(data);
      } else {
        contacts = [];
      }
    }

    // SAVE ke localStorage
    function save() {
      localStorage.setItem("contacts", JSON.stringify(contacts));
    }

    // RENDER LIST
    function renderList() {
      let html = "";

      if (contacts.length === 0) {
        html = "<div class='text-muted'>Belum ada kontak. Hidupmu masih sepi.</div>";
      }

      contacts.forEach((c, i) => {
        html += `
      <div class="card mb-2 card-client" data-aos="fade-up" onclick="showDetail(${i})">
        <div class="card-body">
          <b>${c.nama}</b><br>
          <small>${c.wa}</small>
        </div>
      </div>
    `;
      });

      document.getElementById("clientList").innerHTML = html;
      AOS.init();
    }

    // DETAIL
    function showDetail(i) {
      selected = i;
      let c = contacts[i];

      let disabled = c.sent ? "disabled-btn" : "";

      document.getElementById("detailBox").innerHTML = `
    <div class="card" data-aos="fade-left">
      <div class="card-body">
        <h5>${c.nama}</h5>
        <p>WA: ${c.wa}</p>
        <p>Email: ${c.email || '-'}</p>

        <button class="btn btn-success ${disabled}" onclick="sendWA()">WhatsApp</button>
        <button class="btn btn-primary ${disabled}" onclick="sendEmail()">Email</button>
        <button class="btn btn-danger" onclick="deleteContact()">Hapus</button>
      </div>
    </div>
  `;
    }

    // TAMBAH
    function addContact() {
      let nama = document.getElementById("nama").value.trim();
      let wa = document.getElementById("wa").value.trim();
      let email = document.getElementById("email").value.trim();

      if (!nama || !wa) {
        Swal.fire("Error", "Nama & WA wajib diisi", "error");
        return;
      }

      contacts.push({
        nama,
        wa,
        email,
        sent: false
      });

      save();
      renderList();

      Swal.fire("Berhasil", "Kontak ditambahkan", "success");
    }

    // KIRIM WA
    function sendWA() {
      let c = contacts[selected];

      let msg = `Halo owner dari ${c.nama}, saya ingin menawarkan jasa pembuatan website untuk membantu bisnis Anda lebih berkembang.`;

      let url = `https://wa.me/${c.wa}?text=${encodeURIComponent(msg)}`;
      window.open(url, "_blank");

      markSent();
    }

    // KIRIM EMAIL
    function sendEmail() {
      let c = contacts[selected];

      if (!c.email) {
        Swal.fire("Oops", "Email tidak tersedia", "warning");
        return;
      }

      let subject = "Penawaran Website";
      let body = `Halo owner dari ${c.nama},\nSaya ingin menawarkan jasa pembuatan website untuk membantu bisnis Anda berkembang.`;

      let url = `mailto:${c.email}?subject=${subject}&body=${encodeURIComponent(body)}`;
      window.open(url);

      markSent();
    }

    // STATUS TERKIRIM
    function markSent() {
      contacts[selected].sent = true;
      save();
      showDetail(selected);

      Swal.fire("Terkirim", "Client sudah dikontak", "success");
    }

    // HAPUS
    function deleteContact() {
      contacts.splice(selected, 1);
      save();
      renderList();

      document.getElementById("detailBox").innerHTML = "Kontak dihapus. Semoga kamu tidak butuh dia lagi.";
    }

    // RESET SEMUA
    function clearAll() {
      Swal.fire({
        title: "Hapus semua data?",
        text: "Ini irreversible. Seperti chat yang tidak dibalas.",
        icon: "warning",
        showCancelButton: true
      }).then(result => {
        if (result.isConfirmed) {
          contacts = [];
          localStorage.removeItem("contacts");
          renderList();
          document.getElementById("detailBox").innerHTML = "Semua data telah dihapus.";
        }
      });
    }

    // INIT
    loadFromStorage();
    renderList();
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- AOS -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

</body>

</html>
